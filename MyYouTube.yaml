# MyYouTube Configuration
# ─────────────────────────────────────────────────────────────────────────────
# HOW TO GET A COOKIES FILE (Recommended - more reliable than browser cookies)
# ─────────────────────────────────────────────────────────────────────────────
# Option A – Export with a browser extension (easiest):
#   Chrome/Edge: Install "Get cookies.txt LOCALLY"
#     https://chromewebstore.google.com/detail/get-cookiestxt-locally/cclelndahbckbenkjhflpdbgdldlbecc
#   Firefox:     Install "cookies.txt"
#     https://addons.mozilla.org/en-US/firefox/addon/cookies-txt/
#   Then visit https://www.youtube.com, click the extension, export as Netscape
#   format, and save to the path below.
#
# Option B – Export from your browser via yt-dlp (if browser access works):
#   yt-dlp --cookies-from-browser chrome --cookies ~/Documents/MyYouTube/cookies.txt \
#          --skip-download "https://www.youtube.com"
#
# Option C – Use browser session directly (fallback, less reliable on macOS):
#   Set cookies_file to null and set browser below.
#   Safari requires Full Disk Access permission (System Settings → Privacy).
#   Chrome/Firefox/Brave are recommended.
# ─────────────────────────────────────────────────────────────────────────────

# Path to a Netscape-format cookies.txt file exported from your browser.
# Used first if the file exists. Set to null to skip.
cookies_file: ~/Documents/MyYouTube/cookies.txt

# Browser to pull cookies from if cookies_file is not set or not found.
# Options: chrome, firefox, brave, edge, chromium, opera
# Note: 'safari' requires Full Disk Access on macOS and is often blocked.
browser: chrome

# Download directories
video_dir: ~/Documents/MyYouTube/Video
audio_dir: ~/Documents/MyYouTube/Audio

# yt-dlp output template (see https://github.com/yt-dlp/yt-dlp#output-template)
video_format: "%(title)s_%(uploader)s.%(ext)s"
audio_format: "%(title)s_%(uploader)s.%(ext)s"

# Video quality: best, 4k, 1080, 720, 480, 360
preferred_quality: best

# Player: mpv or vlc
preferred_player: mpv

# Feed cache TTL in seconds
cache_ttl:
  home: 3600          # 1 hour
  subscriptions: 3600
  search: 1800        # 30 minutes
  metadata: 86400     # 24 hours

# Width (in terminal columns) for thumbnail rendering in preview pane
thumbnail_cols: 38
thumbnail_rows: 20
